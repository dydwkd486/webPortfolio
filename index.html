<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>조용장 | Frontend Portfolio</title>
    <meta
      name="description"
      content="동네의 문제를 따뜻하고 실용적인 인터페이스로 풀어내는 프론트엔드 포트폴리오입니다."
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="page-home">
    <div class="page-shell">
      <header class="site-header">
        <div class="container header-inner">
          <a class="brand" href="#top" aria-label="맨 위로 이동">
            <span class="brand-mark">J</span>
            <span class="brand-copy">
              <strong data-name>조용장</strong>
              <span>Frontend Portfolio</span>
            </span>
          </a>

          <button class="nav-toggle" type="button" aria-expanded="false" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav class="site-nav">
            <a href="#top">소개</a>
            <a href="#skills">기술</a>
            <a href="#projects">프로젝트</a>
            <a href="#career">커리어</a>
          </nav>
        </div>
      </header>

      <main id="top">
        <section class="hero-section">
          <div class="container hero-layout">
            <div class="hero-primary">
              <div class="hero-copy" data-reveal>
                <p class="eyebrow">Danggeun-inspired, warm and practical</p>
                <h1> 프론트엔드 개발자 포트폴리오</h1>
                <p class="hero-description" data-tagline></p>
                <div class="hero-actions">
                  <a class="button button-primary" href="#projects">프로젝트 보기</a>
                  <a class="button button-secondary" href="#contact">연락하기</a>
                </div>
              </div>
            </div>

            <div class="hero-secondary" data-reveal>
              <aside class="hero-card">
                <p class="card-kicker">Profile Snapshot</p>
                <h2 data-role></h2>
                <p class="hero-card-summary" data-summary></p>
                <dl class="hero-facts" id="hero-facts"></dl>
                <div class="stat-grid" id="stat-grid"></div>
              </aside>
            </div>
            <div class="contact-links" id="contact-links"></div>
          </div>
          <div class="hero-orb hero-orb-a"></div>
          <div class="hero-orb hero-orb-b"></div>
        </section>  


        <section class="section" id="skills">
          <div class="container stack-panel">
            <div class="section-heading compact" data-reveal>
              <p class="eyebrow">Skills</p>
            </div>
            <div class="stack-grid" id="skill-grid"></div>
          </div>
        </section>

        <section class="section section-accent" id="projects">
          <div class="container">
            <div class="section-heading compact" data-reveal>
              <p class="eyebrow">Selected Projects</p>
            </div>
            <div class="project-list" id="project-grid"></div>
          </div>
        </section>

        <section class="section" id="career">
          <div class="container career-shell">
            <div class="section-heading compact" data-reveal>
              <p class="eyebrow">Career</p>
            </div>
            <div class="career-list" id="career-grid"></div>
          </div>
        </section>



      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <p><span data-name>조용장</span> Portfolio</p>
          <p><span id="current-year"></span> GitHub Pages-ready static site.</p>
        </div>
      </footer>
    </div>

    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
